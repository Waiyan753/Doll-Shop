<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="../Index/style.css">
    <link rel="stylesheet" href="buy.css">
    <title>Website Learning With KMD</title>
</head>

<body>
<section class="mycontainer buysec">
    <nav class="navbar">
        <a href="index.html" class="logo">
            Doll Shopping
        </a>
        <ul class="links" type="none">
            <a href="../Index/Index.html">
                <li class="link">Home</li>
            </a>
            <a href="../Product/product.html">
                <li class="link">Product</li>
            </a>
            <a href="../about/about.html">
                <li class="link">About</li>
            </a>
            <a href="../contact/contact.html">
                <li class="link contact">Contact</li>
            </a>
        </ul>
    </nav>
    <div class="buy">
        <div class="buy-card">
            <p class="title">Welcome User</p>
            <p class="text">
                Thank you for ordering. Please enter your name and address.
            </p>
            <form>
                <div class="inputborder">
                    <div class="formdiv">
                        <input type="text" class="forminput" id="myname" placeholder="">
                        <label class="formlabel">Your Name</label>
                    </div>
                </div>
                <div class="inputborder">
                    <div class="formdiv">
                        <input type="text" class="forminput" id="add" placeholder="">
                        <label class="formlabel">Address</label>
                    </div>
                </div>
                <div class="formbottom">
                    <label class="check">
                        <input type="checkbox"> Cash On Delivery
                    </label>
                </div>
                <div class="formbtn">
                    <button type="button" class="order" id="order">
                        Order
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
